version: 1
applications:
  - appRoot: frontend
    env:
      variables:
        AMPLIFY_MONOREPO_APP_ROOT: frontend
    frontend:
      phases:
        preBuild:
          commands:
            - cd ..
            - npm ci
        build:
          commands:
            - npm run build -w @music-store/web
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - frontend/.next/cache/**/*
