name: Pull Request CI

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  validate:
    name: Validate Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint across workspaces
        run: npm run lint --workspaces --if-present

      - name: Run TypeScript type-checking across workspaces
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r tsconfig; do
            workspace_dir="$(dirname "$tsconfig")"
            workspace_name="$(node -p "require('./${workspace_dir}/package.json').name")"
            echo "Type-checking ${workspace_name}"
            npm exec --workspace "$workspace_name" -- tsc --noEmit
          done < <(find apps packages services infrastructure -name tsconfig.json -not -path "*/node_modules/*")

      - name: Synthesize CDK app
        working-directory: infrastructure
        run: npx cdk synth
